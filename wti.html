<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020617;--card:#0f172a;--card2:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--bull:#22c55e;--bear:#ef4444;--neutral:#f59e0b;--accent:#d97706;--accent2:#b45309;--mono:'JetBrains Mono',monospace;--sans:'Noto Sans TC',sans-serif}
body{background:linear-gradient(180deg,var(--bg) 0%,var(--card) 30%,var(--bg) 100%);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Header */
.header{background:linear-gradient(135deg,var(--card) 0%,#1c1917 50%,var(--card) 100%);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100}

.header h1{font-size:17px;font-weight:900;font-family:var(--mono);background:linear-gradient(135deg,var(--accent),var(--accent2),#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}

.btn{font-family:var(--mono);font-size:11px;border-radius:6px;padding:6px 12px;cursor:pointer;border:1px solid;transition:all 0.2s;background:none}

/* Nav */

/* Container */

/* Gauge */
.gauge-card{background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center}

/* Stats */

/* History chart */
.history-card{background:var(--card);border:1px solid var(--card2);border-radius:12px;padding:16px;margin-bottom:16px}
.history-chart{height:80px;display:flex;align-items:center;gap:1px}

/* Distribution */
.dist-card{background:var(--card);border:1px solid var(--card2);border-radius:12px;padding:16px;margin-bottom:16px}
.dist-title{color:var(--text);font-size:13px;font-weight:700;font-family:var(--mono);letter-spacing:1px;margin-bottom:12px}

/* Strategy */

.strat-desc{font-size:11px;color:var(--muted);margin-top:2px}
.strat-risk{font-size:11px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:4px}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-btn{font-family:var(--mono);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:var(--card2);color:var(--muted);transition:all 0.2s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Market cards */
.market-card{background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color 0.2s}
.market-card:hover{border-color:var(--accent)}
.market-row{display:flex;justify-content:space-between;align-items:flex-start}
.market-tags{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff}
.tag-hit_high{background:#22c55e}.tag-hit_low{background:#ef4444}.tag-above_below{background:#06b6d4}.tag-range{background:var(--accent2)}.tag-other{background:var(--dim)}
.tag-tf{background:transparent;border:1px solid #475569;color:var(--muted)}
.market-q{font-size:13px;color:var(--text);line-height:1.4;font-family:var(--mono)}
.market-price{font-size:22px;font-weight:800;font-family:var(--mono)}
.market-vol{font-size:11px;color:var(--dim);margin-top:2px}
.prob-bar{margin-top:8px;height:4px;background:var(--card2);border-radius:2px;overflow:hidden}
.prob-fill{height:100%;border-radius:2px;transition:width 0.5s}

/* Method */
.method{background:var(--card);border:1px solid var(--card2);border-radius:12px;padding:16px;margin-top:20px;margin-bottom:30px}
.method h3{color:var(--muted);font-size:13px;font-weight:700;font-family:var(--mono);margin-bottom:10px}
.method p{font-size:12px;color:var(--dim);line-height:1.8;margin-bottom:6px}
.method strong{color:#fbbf24}.method .warn{color:var(--bear)}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--dim);font-size:14px}

/* Responsive */
@media(max-width:480px){
  .header h1{font-size:15px}
  .stat-value{font-size:18px}
  .signal-label{font-size:22px}
  .market-price{font-size:18px}
  .stats{grid-template-columns:repeat(3,1fr);gap:6px}
}

<script>
// ── State ─────────────────────────────────────────────────────────────────
let autoOn = true, intv = null, curFilter = 'all';
let D = { signal: null, markets: [], history: [] };
const $ = s => document.querySelector(s);
const pct = v => (v * 100).toFixed(1) + '%';
const usd = v => '$' + Number(v).toLocaleString('en-US', { maximumFractionDigits: 0 });

// ── API ───────────────────────────────────────────────────────────────────
const GAMMA_DIRECT = 'https://gamma-api.polymarket.com';
const CORS_PROXY = 'https://corsproxy.io/?url=';

async function fetchMarketsFromAPI(params) {
    const qs = new URLSearchParams(params).toString();
    try {
        const r = await fetch('/api/poly/markets?' + qs);
        if (r.ok) return await r.json();
    } catch (e) {}
    try {
        const r = await fetch(`${GAMMA_DIRECT}/markets?${qs}`);
        if (r.ok) return await r.json();
    } catch (e) {}
    const url = `${GAMMA_DIRECT}/markets?${qs}`;
    const r = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!r.ok) throw new Error('Polymarket API unavailable');
    return await r.json();
}

async function fetchEventsFromAPI(params) {
    const qs = new URLSearchParams(params).toString();
    try {
        const r = await fetch('/api/poly/events?' + qs);
        if (r.ok) return await r.json();
    } catch (e) {}
    try {
        const r = await fetch(`${GAMMA_DIRECT}/events?${qs}`);
        if (r.ok) return await r.json();
    } catch (e) {}
    return [];
}

async function fetchWTIMarkets() {
    const [topMarkets, allEvents] = await Promise.all([
        fetchMarketsFromAPI({ limit: 200, active: true, order: 'volume24hr', ascending: false }),
        fetchEventsFromAPI({ limit: 100, active: true, order: 'volume24hr', ascending: false }),
    ]);

    // Extract markets from events that match WTI/oil
    const wtiRe = /\b(wti|crude\s*oil|oil\s*price|brent)\b/i;
    const eventMarkets = [];
    (allEvents || []).forEach(ev => {
        const title = ev.title || '';
        if (wtiRe.test(title)) {
            (ev.markets || []).forEach(m => eventMarkets.push(m));
        }
    });

    // Merge & deduplicate
    const seen = new Set();
    const allMarkets = [];
    [...eventMarkets, ...topMarkets].forEach(m => {
        if (m.id && !seen.has(m.id)) { seen.add(m.id); allMarkets.push(m); }
    });

    return filterWTI(allMarkets);
}

function filterWTI(markets) {
    const wtiRe = /\b(wti|crude\s*oil|oil)\b/i;
    const excludeRe = /(olive oil|coconut oil|essential oil|cooking oil|snake oil)/i;
    return markets.filter(m => {
        const q = m.question || m.title || '';
        return wtiRe.test(q) && !excludeRe.test(q);
    });
}

// ── Signal Engine ─────────────────────────────────────────────────────────
function parseMarket(m) {
    const q = (m.question || m.title || '').toLowerCase();
    let prices = [], outcomes = [];
    try { prices = JSON.parse(m.outcomePrices || '[]').map(Number); } catch(e) {}
    try { outcomes = JSON.parse(m.outcomes || '[]'); } catch(e) {}
    const vol = Number(m.volume || m.volumeNum || 0);
    const yesPrice = prices[0] || 0;
    const noPrice = prices[1] || 0;

    let type = 'other', direction = null, rangeLow = null, rangeHigh = null;
    let threshold = null, abDirection = null, timeframe = null;

    // Timeframe
    if (q.includes('april') || q.includes('apr')) timeframe = 'APR';
    else if (q.includes('may')) timeframe = 'MAY';
    else if (q.includes('june') || q.includes('jun')) timeframe = 'JUN';
    else if (q.includes('q2')) timeframe = 'Q2';
    else if (q.includes('q3')) timeframe = 'Q3';
    else if (q.includes('2026')) timeframe = '2026';

    // Type: "hit (HIGH) $X" or "hit (LOW) $X"
    const hitHighMatch = q.match(/hit\s*\(high\)\s*\$?([\d,]+)/i);
    const hitLowMatch = q.match(/hit\s*\(low\)\s*\$?([\d,]+)/i);

    if (hitHighMatch) {
        type = 'hit_high';
        threshold = Number(hitHighMatch[1].replace(/,/g, ''));
        abDirection = 'above';
    } else if (hitLowMatch) {
        type = 'hit_low';
        threshold = Number(hitLowMatch[1].replace(/,/g, ''));
        abDirection = 'below';
    } else if (q.includes('above') || q.includes('below')) {
        type = 'above_below';
        const nm = q.match(/\$?([\d,]+)/);
        if (nm) {
            threshold = Number(nm[1].replace(/,/g, ''));
            abDirection = q.includes('above') ? 'above' : 'below';
        }
    } else if (q.match(/\d[\d,]*\s*-\s*\d[\d,]*/)) {
        const rm = q.match(/([\d,]+)\s*-\s*([\d,]+)/);
        if (rm) {
            rangeLow = Number(rm[1].replace(/,/g, ''));
            rangeHigh = Number(rm[2].replace(/,/g, ''));
            if (rangeLow > 0 && rangeHigh > 0) type = 'range';
        }
    }

    return {
        id: m.id, question: m.question || m.title, type, direction,
        rangeLow, rangeHigh, threshold, abDirection, timeframe,
        yesPrice, noPrice, volume: vol, outcomes, slug: m.slug
    };
}

function deriveSignal(markets) {
    if (!markets.length) return null;
    const hitHigh = markets.filter(m => m.type === 'hit_high');
    const hitLow = markets.filter(m => m.type === 'hit_low');
    const aboveBelow = markets.filter(m => m.type === 'above_below');
    const priceRange = markets.filter(m => m.type === 'range');

    // Derive expected price from hit_high markets (probabilistic)
    // Each "hit $X" with YES prob p means the market thinks there's p% chance oil goes to X
    let expectedHigh = null, expectedLow = null;
    let bullScore = 0, bearScore = 0, totalWeight = 0;

    // Hit high: higher YES price = more likely to reach that level = bullish
    hitHigh.sort((a, b) => (a.threshold || 0) - (b.threshold || 0));
    hitHigh.forEach(m => {
        const w = Math.log10(Math.max(m.volume, 1) + 1);
        bullScore += m.yesPrice * w;
        totalWeight += w;
    });

    // Hit low: higher YES price = more likely to drop to that level = bearish
    hitLow.sort((a, b) => (b.threshold || 0) - (a.threshold || 0));
    hitLow.forEach(m => {
        const w = Math.log10(Math.max(m.volume, 1) + 1);
        bearScore += m.yesPrice * w;
        totalWeight += w;
    });

    // Above/below
    aboveBelow.forEach(m => {
        const w = Math.log10(Math.max(m.volume, 1) + 1);
        if (m.abDirection === 'above') bullScore += m.yesPrice * w;
        else bearScore += m.yesPrice * w;
        totalWeight += w;
    });

    const dirBias = totalWeight > 0 ? (bullScore - bearScore) / totalWeight : 0;

    // Find expected price from hit_high probability curve
    // The price where YES prob crosses ~50% is the expected price
    let expectedPrice = null;
    if (hitHigh.length >= 2) {
        // Find the transition point where YES drops below 50%
        let below50 = hitHigh.filter(m => m.yesPrice < 0.5);
        let above50 = hitHigh.filter(m => m.yesPrice >= 0.5);
        if (below50.length > 0 && above50.length > 0) {
            const lastAbove = above50[above50.length - 1];
            const firstBelow = below50[0];
            // Linear interpolation
            const range = (lastAbove.threshold || 0) - (firstBelow.threshold || 0);
            const pRange = lastAbove.yesPrice - firstBelow.yesPrice;
            if (pRange > 0) {
                expectedPrice = (lastAbove.threshold || 0) + range * (0.5 - lastAbove.yesPrice) / pRange;
            }
        }
        if (!expectedPrice && above50.length > 0) {
            expectedPrice = above50[above50.length - 1].threshold;
        }
    }

    // Range analysis
    let rangeBias = 0;
    if (priceRange.length > 0) {
        let totalProb = 0, weightedMid = 0;
        priceRange.forEach(m => {
            if (m.rangeLow != null && m.rangeHigh != null) {
                const mid = (m.rangeLow + m.rangeHigh) / 2;
                weightedMid += mid * m.yesPrice;
                totalProb += m.yesPrice;
            }
        });
        if (totalProb > 0 && expectedPrice) {
            const rangeExpected = weightedMid / totalProb;
            rangeBias = (rangeExpected - expectedPrice) / expectedPrice;
        }
    }

    // Composite signal
    let composite = totalWeight > 0 ? dirBias : 0;
    composite = Math.max(-1, Math.min(1, composite));

    const strength = Math.min(1, Math.abs(composite) * 2);

    let label, action;
    if (composite > 0.3) { label = 'STRONG BULL'; action = '看漲 — 油價上行風險高'; }
    else if (composite > 0.15) { label = 'BULL'; action = '溫和看漲 — 偏多操作'; }
    else if (composite < -0.3) { label = 'STRONG BEAR'; action = '看跌 — 油價下行壓力大'; }
    else if (composite < -0.15) { label = 'BEAR'; action = '溫和看跌 — 偏空操作'; }
    else { label = 'NEUTRAL'; action = '觀望 — 等方向明朗'; }

    const totalVolume = markets.reduce((s, m) => s + m.volume, 0);

    // Key levels
    const keyLevels = [];
    hitHigh.forEach(m => {
        if (m.threshold && m.yesPrice > 0.01 && m.yesPrice < 0.99) {
            keyLevels.push({ price: m.threshold, prob: m.yesPrice, type: 'high' });
        }
    });
    hitLow.forEach(m => {
        if (m.threshold && m.yesPrice > 0.01 && m.yesPrice < 0.99) {
            keyLevels.push({ price: m.threshold, prob: m.yesPrice, type: 'low' });
        }
    });

    return {
        composite: +composite.toFixed(4), label, strength: +strength.toFixed(4), action,
        dirBias: +dirBias.toFixed(4), rangeBias: +rangeBias.toFixed(4),
        expectedPrice: expectedPrice ? Math.round(expectedPrice) : null,
        marketCount: markets.length, hitHighCount: hitHigh.length,
        hitLowCount: hitLow.length, abCount: aboveBelow.length, rangeCount: priceRange.length,
        totalVolume: +totalVolume.toFixed(2), keyLevels,
        timestamp: new Date().toISOString()
    };
}

// ── Fetch + Compute ───────────────────────────────────────────────────────
async function fetchAll() {
    try {
        const raw = await fetchWTIMarkets();
        let markets = raw.map(parseMarket);
        const signal = deriveSignal(markets);

        D.signal = signal;
        D.markets = markets;
        if (signal) {
            D.history.push({ composite: signal.composite, ts: signal.timestamp });
            if (D.history.length > 60) D.history = D.history.slice(-60);
        }
        D.lastUpdate = new Date().toISOString();
        render();
        $('#metaInfo').textContent = `更新: ${new Date().toLocaleTimeString('zh-TW')} | ${markets.length} WTI 市場 | Polymarket Gamma API`;
    } catch (e) {
        $('#metaInfo').textContent = '⚠ ' + e.message;
    }
}

async function doRefresh() {
    $('#refreshBtn').textContent = '⟳ ...';
    try { await fetchAll(); } finally { $('#refreshBtn').textContent = '⟳ 刷新'; }
}

function toggleAuto() {
    autoOn = !autoOn;
    const b = $('#autoBtn');
    b.textContent = autoOn ? '● 自動' : '○ 暫停';
    b.className = 'btn btn-auto' + (autoOn ? '' : ' off');
    if (autoOn) intv = setInterval(fetchAll, 30000);
    else clearInterval(intv);
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
    const { signal: sig, markets, history } = D;
    if (!sig) { $('#app').innerHTML = '<div class="loading">⏳ 等待數據...</div>'; return; }

    const sc = sig.composite > 0.15 ? 'var(--bull)' : sig.composite < -0.15 ? 'var(--bear)' : 'var(--neutral)';
    const ang = sig.composite * 90;
    let h = '';

    // Gauge
    h += `<div class="gauge-card" style="box-shadow:0 0 40px ${sc}10">
    <svg width="260" height="150" viewBox="0 0 280 160" style="display:block;margin:0 auto">
    <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="var(--bear)"/>
      <stop offset="35%" stop-color="var(--neutral)"/>
      <stop offset="65%" stop-color="var(--neutral)"/>
      <stop offset="100%" stop-color="var(--bull)"/>
    </linearGradient></defs>
    <path d="M 30 140 A 110 110 0 0 1 250 140" fill="none" stroke="var(--card2)" stroke-width="20" stroke-linecap="round"/>
    <path d="M 30 140 A 110 110 0 0 1 250 140" fill="none" stroke="url(#gg)" stroke-width="16" stroke-linecap="round" opacity="0.6"/>
    <g transform="rotate(${ang},140,140)">
      <line x1="140" y1="140" x2="140" y2="48" stroke="${sc}" stroke-width="3" stroke-linecap="round"/>
      <circle cx="140" cy="140" r="8" fill="${sc}"/>
      <circle cx="140" cy="140" r="4" fill="var(--bg)"/>
    </g>
    <text x="20" y="155" fill="var(--bear)" font-size="11" font-family="var(--mono)">BEAR</text>
    <text x="230" y="155" fill="var(--bull)" font-size="11" font-family="var(--mono)">BULL</text>
    </svg>
    <div class="signal-label" style="color:${sc}">${sig.label}</div>
    <div class="signal-meta">分數: ${(sig.composite * 100).toFixed(1)} | 強度: ${(sig.strength * 100).toFixed(0)}%</div>
    <div class="action-box" style="background:${sc}10;border:1px solid ${sc}30">
      <div class="action-text" style="color:${sc}">${sig.action}</div>
      <div class="action-sub">${sig.marketCount} 個市場 | ${usd(sig.totalVolume)} 交易量</div>
    </div></div>`;

    // Stats
    h += `<div class="stats">
    <div class="stat-card"><div class="stat-label">方向偏差</div>
      <div class="stat-value" style="color:${sig.dirBias > 0 ? 'var(--bull)' : sig.dirBias < 0 ? 'var(--bear)' : 'var(--neutral)'}">${sig.dirBias > 0 ? '+' : ''}${(sig.dirBias * 100).toFixed(1)}</div>
      <div class="stat-sub">${sig.dirBias > 0 ? '偏多' : sig.dirBias < 0 ? '偏空' : '平衡'}</div></div>
    <div class="stat-card"><div class="stat-label">預期價格</div>
      <div class="stat-value" style="color:var(--accent)">${sig.expectedPrice ? '$' + sig.expectedPrice : '—'}</div>
      <div class="stat-sub">機率曲線估算</div></div>
    <div class="stat-card"><div class="stat-label">活躍市場</div>
      <div class="stat-value" style="color:var(--accent)">${sig.marketCount}</div>
      <div class="stat-sub">高${sig.hitHighCount} 低${sig.hitLowCount} 突${sig.abCount}</div></div></div>`;

    // Signal History
    if (history.length > 1) {
        const hb = history.map(x => {
            const c = x.composite;
            const co = c > 0.15 ? 'var(--bull)' : c < -0.15 ? 'var(--bear)' : 'var(--neutral)';
            return `<div class="history-bar" style="height:${Math.max(Math.abs(c) * 100, 4)}%;background:${co};align-self:${c >= 0 ? 'flex-end' : 'flex-start'}"></div>`;
        }).join('');
        h += `<div class="history-card"><div class="dist-title">信號趨勢 (${history.length}筆)</div><div class="history-chart">${hb}</div></div>`;
    }

    // Key Price Levels Chart
    const hitHigh = markets.filter(m => m.type === 'hit_high').sort((a, b) => (a.threshold || 0) - (b.threshold || 0));
    const hitLow = markets.filter(m => m.type === 'hit_low').sort((a, b) => (a.threshold || 0) - (b.threshold || 0));

    if (hitHigh.length > 0) {
        const mx = Math.max(...hitHigh.map(r => r.yesPrice), 0.01);
        let rb = '';
        hitHigh.forEach(r => {
            const hp = (r.yesPrice / mx) * 100;
            const im = r.yesPrice === mx;
            const prob50 = Math.abs(r.yesPrice - 0.5) < 0.15;
            const co = r.yesPrice > 0.5 ? 'linear-gradient(180deg,var(--bull),#16a34a)' :
                       prob50 ? 'linear-gradient(180deg,var(--neutral),#d97706)' :
                       'linear-gradient(180deg,var(--bear),#dc2626)';
            rb += `<div class="dist-col">
              <div class="dist-pct" style="color:${r.yesPrice > 0.5 ? 'var(--bull)' : r.yesPrice > 0.3 ? 'var(--neutral)' : 'var(--bear)'};font-weight:${prob50 ? 700 : 400}">${pct(r.yesPrice)}</div>
              <div class="dist-bar" style="height:${hp}%;background:${co}"></div>
              <div class="dist-range">$${r.threshold}</div>
            </div>`;
        });
        h += `<div class="dist-card"><div class="dist-title">價格上行機率 (HIGH)</div><div class="dist-bars">${rb}</div></div>`;
    }

    if (hitLow.length > 0) {
        const mx = Math.max(...hitLow.map(r => r.yesPrice), 0.01);
        let rb = '';
        hitLow.forEach(r => {
            const hp = (r.yesPrice / mx) * 100;
            const co = r.yesPrice > 0.5 ? 'linear-gradient(180deg,var(--bear),#991b1b)' :
                       'linear-gradient(180deg,var(--neutral),#d97706)';
            rb += `<div class="dist-col">
              <div class="dist-pct" style="color:${r.yesPrice > 0.5 ? 'var(--bear)' : 'var(--neutral)'}">${pct(r.yesPrice)}</div>
              <div class="dist-bar" style="height:${hp}%;background:${co}"></div>
              <div class="dist-range">$${r.threshold}</div>
            </div>`;
        });
        h += `<div class="dist-card"><div class="dist-title">價格下行機率 (LOW)</div><div class="dist-bars">${rb}</div></div>`;
    }

    // Strategy Suggestions
    const c = sig.composite;
    let st = [];
    if (c > 0.3) {
        st.push({ n: '做多原油', d: '上行機率偏高', r: '中', rc: 'var(--bull)' });
        st.push({ n: '買入USO/UCO', d: '原油ETF做多', r: '低', rc: 'var(--bull)' });
    } else if (c > 0.15) {
        st.push({ n: '輕倉做多', d: '溫和看漲', r: '低', rc: 'var(--bull)' });
    } else if (c < -0.3) {
        st.push({ n: '做空原油', d: '下行壓力大', r: '中', rc: 'var(--neutral)' });
        st.push({ n: '買入SCO', d: '原油反向ETF', r: '低', rc: 'var(--bull)' });
    } else if (c < -0.15) {
        st.push({ n: '輕倉做空', d: '溫和看跌', r: '低', rc: 'var(--bull)' });
    } else {
        st.push({ n: '觀望等待', d: '等方向明朗', r: '無', rc: 'var(--dim)' });
        st.push({ n: '區間操作', d: '高拋低吸', r: '低', rc: 'var(--bull)' });
    }
    if (sig.expectedPrice) {
        st.push({ n: `預期價格 $${sig.expectedPrice}`, d: '機率曲線 50% 交叉點', r: '參考', rc: 'var(--accent)' });
    }
    h += `<div class="dist-card"><div class="dist-title">建議策略</div>${st.map(s =>
        `<div class="strategy-item"><div><div class="strat-name">${s.n}</div><div class="strat-desc">${s.d}</div></div><span class="strat-risk" style="color:${s.rc};border:1px solid ${s.rc}40">風險:${s.r}</span></div>`
    ).join('')}</div>`;

    // Filters
    const typeLabels = { all: '全部', hit_high: '上行', hit_low: '下行', above_below: '突破', range: '區間', other: '其他' };
    const cn = { all: markets.length };
    markets.forEach(m => { cn[m.type] = (cn[m.type] || 0) + 1; });
    h += '<div class="filters">';
    for (const k of ['all', 'hit_high', 'hit_low', 'above_below', 'range']) {
        if (k !== 'all' && !cn[k]) continue;
        h += `<button class="filter-btn${curFilter === k ? ' active' : ''}" onclick="setF('${k}')">${typeLabels[k] || k}(${cn[k] || 0})</button>`;
    }
    h += '</div>';

    // Market Cards
    const fl = curFilter === 'all' ? markets : markets.filter(m => m.type === curFilter);
    [...fl].sort((a, b) => b.volume - a.volume).forEach(m => {
        const pc = m.yesPrice >= 0.5 ? 'var(--bull)' : 'var(--bear)';
        const tf = m.timeframe ? `<span class="tag tag-tf">${m.timeframe}</span>` : '';
        h += `<div class="market-card">
          <div class="market-row">
            <div style="flex:1">
              <div class="market-tags"><span class="tag tag-${m.type}">${typeLabels[m.type] || m.type}</span>${tf}</div>
              <div class="market-q">${m.question}</div>
            </div>
            <div style="text-align:right;min-width:90px">
              <div class="market-price" style="color:${pc}">${pct(m.yesPrice)}</div>
              <div class="market-vol">Vol:${usd(m.volume)}</div>
            </div>
          </div>
          <div class="prob-bar"><div class="prob-fill" style="width:${pct(m.yesPrice)};background:${pc}"></div></div>
        </div>`;
    });
    if (fl.length === 0) h += '<div class="loading">無符合條件的市場</div>';

    // Methodology
    h += `<div class="method"><h3>系統方法論</h3>
    <p><strong>數據源：</strong>Polymarket Gamma API (Events + Markets) 每30秒自動刷新</p>
    <p><strong>信號：</strong>上行機率(HIGH) vs 下行機率(LOW) 加權運算方向偏差</p>
    <p><strong>預期價格：</strong>從 hit HIGH 市場的機率曲線中找 50% 交叉點估算</p>
    <p><strong>權重：</strong>交易量 log10 加權，高交易量市場影響力更大</p>
    <p><strong class="warn">風險提示：</strong>本系統僅供參考，不構成投資建議。原油價格受地緣政治、OPEC決策、全球需求等多重因素影響。</p></div>`;

    $('#app').innerHTML = h;
}

function setF(f) { curFilter = f; render(); }

// ── Init ──────────────────────────────────────────────────────────────────
fetchAll();
intv = setInterval(fetchAll, 30000);
</script>
</body>
</html>
