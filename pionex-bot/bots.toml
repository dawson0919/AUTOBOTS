# 三刀流 v6 Signal Manager — Bot Configuration
# Each [bots.XXX] section defines one managed bot.

[global]
interval = "60M"          # Kline interval (Pionex API format: 60M = 1H)
poll_minutes = 60          # Check every N minutes (match candle close)
dry_run = false            # LIVE MODE — real trading enabled
max_flips_per_day = 2      # Max direction changes per symbol per 24h
cooldown_seconds = 10      # Wait between cancel and create
log_level = "INFO"
mtf_confirm = false        # Multi-timeframe: require 4H agreement before flipping

[bots.xaut]
symbol = "XAUT_USDT_PERP"
base = "XAUT.PERP"
quote = "USDT"
liu_bei = 100
guan_yu = 30
zhang_fei = 10
dist_pct = 1.5
disable_bounce = true
grid_bottom = "4000"
grid_top = "5000"
grid_rows = 50
grid_type = "arithmetic"
leverage = 5
investment = "300"
bu_order_id = "18ad987a-8cd5-4183-a1d6-637913a823f2"

